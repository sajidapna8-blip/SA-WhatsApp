<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screen</title>
    <style>
        /* ساجد بھائی، یہ ڈیزائن (CSS) اب اسی فائل میں ہے تاکہ کارٹون ختم ہوں */
        body { margin: 0; font-family: sans-serif; background-color: #e5ddd5; }
        .wa-header { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-right { display: flex; gap: 18px; }
        
        .wa-footer { position: fixed; bottom: 8px; width: 100%; display: flex; padding: 0 8px; gap: 8px; align-items: center; box-sizing: border-box; }
        .input-bar { flex: 1; background: white; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; gap: 12px; }
        .input-bar input { border: none; outline: none; flex: 1; font-size: 16px; }
        
        .mic-button { background-color: #00a884; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>
    <div class="wa-header">
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <div style="width: 35px; height: 35px; background: #ddd; border-radius: 50%;"></div>
            <strong>Shakeel czn</strong>
        </div>
        <div class="header-right">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1-.45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </div>
    </div>

    <div class="wa-footer">
        <div class="input-bar">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#888"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5s.67 1.5 1.5 1.5zm.5 4c.53 2.11 2.43 3.5 4.5 3.5s3.97-1.39 4.5-3.5H9z"/></svg>
            <input type="text" placeholder="Message">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#888"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        </div>
        <div class="mic-button">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>
</body>
</html>
