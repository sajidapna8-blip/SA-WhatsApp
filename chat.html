<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="whatsapp-bg">
    <div class="chat-header">
        <div class="header-left">
            <a href="index.html" class="back-icon">←</a>
            <img src="https://via.placeholder.com/40" class="profile-img">
            <div class="header-info">
                <strong>Sweet family ❤️</strong>
                <span>Abid bahi, Abu jaan, Cha...</span>
            </div>
        </div>
        <div class="header-right">📹 &nbsp; 📞 &nbsp; ⋮</div>
    </div>

    <div class="chat-container">
        <div class="msg-row received">
            <img src="https://via.placeholder.com/30" class="sender-thumb">
            <div class="msg-bubble">
                <span class="name-label">Cha Cha Gulshar</span>
                <div class="voice-player">
                    <span class="play-icon">▶</span>
                    <div class="audio-waves">
                        <div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div>
                    </div>
                    <img src="https://via.placeholder.com/20" class="mini-mic">
                </div>
                <div class="msg-meta">0:44 <span class="time">10:52 am</span></div>
            </div>
        </div>

        <div class="msg-row received">
            <img src="https://via.placeholder.com/30" class="sender-thumb">
            <div class="msg-bubble">
                <span class="name-label">Abu jaan</span>
                <p>inshallah</p>
                <span class="time">10:57 am</span>
            </div>
        </div>
    </div>

    <div class="chat-footer">
        <div class="input-wrapper">
            <span>😊</span>
            <input type="text" placeholder="Message">
            <span>📎</span>
            <span>📷</span>
        </div>
        <div class="mic-button">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>
</body>
</html>
