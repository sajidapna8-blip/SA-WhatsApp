<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screen</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .wa-header { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .back-btn { text-decoration: none; color: white; font-size: 20px; }
        .avatar { width: 35px; height: 35px; background: #ccc; border-radius: 50%; }
        .wa-footer { position: fixed; bottom: 8px; width: 100%; display: flex; padding: 0 8px; gap: 8px; align-items: center; box-sizing: border-box; }
        .input-bar { flex: 1; background: white; border-radius: 25px; padding: 5px 12px; display: flex; align-items: center; gap: 10px; }
        .input-bar input { border: none; outline: none; flex: 1; font-size: 16px; padding: 8px 0; }
        .action-button { background-color: #00a884; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="wa-header">
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <div class="avatar"></div>
            <strong>Shakeel czn</strong>
        </div>
        <div style="display: flex; gap: 15px;">
            <span>📹</span> <span>📞</span> <span>⋮</span>
        </div>
    </div>

    <div class="wa-footer">
        <div class="input-bar">
            <span>😊</span>
            <input type="text" id="msgInput" placeholder="Message">
            <span>📎</span> <span>📷</span>
        </div>
        <button class="action-button" id="mainBtn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const mainBtn = document.getElementById('mainBtn');

        const micSVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
        const sendSVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';

        msgInput.addEventListener('input', function() {
            if (msgInput.value.trim() !== "") {
                mainBtn.innerHTML = sendSVG;
            } else {
                mainBtn.innerHTML = micSVG;
            }
        });
    </script>

</body>
</html>
