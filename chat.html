<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg">
    <div class="header">
        <div class="user-info">
            <a href="index.html" class="back-btn">←</a>
            <img src="https://via.placeholder.com/40" class="profile-pic">
            <div class="group-name">
                <strong>Sweet family ❤️</strong>
                <p>Abid bahi, Abu jaan, Cha...</p>
            </div>
        </div>
        <div class="header-icons">
            <span>📹</span> <span>📞</span> <span>⋮</span>
        </div>
    </div>

    <div class="chat-box">
        <div class="message-container received">
            <img src="https://via.placeholder.com/30" class="sender-img">
            <div class="message-body">
                <span class="sender-name">Cha Cha Gulshar</span>
                <div class="voice-note">
                    <span class="play-btn">▶️</span>
                    <div class="wave-line"></div>
                    <span class="duration">0:44</span>
                </div>
            </div>
        </div>

        <div class="message-container received">
            <img src="https://via.placeholder.com/30" class="sender-img">
            <div class="message-body">
                <span class="sender-name">Abu jaan</span>
                <p>inshallah</p>
                <span class="msg-time">10:57 am</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="input-box">
            <span>😊</span>
            <input type="text" placeholder="Message">
            <span>📎</span> <span>📷</span>
        </div>
        <div class="mic-btn">🎤</div>
    </div>
</body>
</html>
