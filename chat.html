<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="user-info">
            <a href="index.html" class="back-btn">←</a>
            <div class="profile-pic">👥</div>
            <span>کوڈنگ گروپ</span>
        </div>
        <div class="header-icons">
            <span>📹</span> <span>📞</span> <span>⋮</span>
        </div>
    </div>

    <div class="chat-box">
        <div class="message received">ساجد بھائی: السلام علیکم!</div>
        <div class="message sent">وعلیکم السلام!</div>
    </div>

    <div class="footer">
        <div class="input-box">
            <span>😊</span>
            <input type="text" placeholder="پیغام لکھیں...">
            <span class="attach-icon">📎</span>
        </div>
        <div class="mic-btn">🎤</div>
    </div>
</body>
</html>
