<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="wa-chat-bg">
    <div class="wa-header">
        <a href="index.html" class="back-arrow">←</a>
        <img src="https://via.placeholder.com/40" class="chat-avatar">
        <div class="header-text">
            <strong>Shakeel czn</strong>
        </div>
        <div class="header-icons">
            <img src="https://img.icons8.com/material-outlined/24/ffffff/video-call.png" alt="Video">
            <img src="https://img.icons8.com/material-outlined/24/ffffff/phone.png" alt="Call">
            <img src="https://img.icons8.com/material-outlined/24/ffffff/menu-vertical.png" alt="More">
        </div>
    </div>

    <div class="message-container">
        <div class="date-badge">12 February 2026</div>
        <div class="msg-row out">
            <div class="bubble sent">
                <span class="text-hi">Hi</span> <span class="time-small">11:51 am ✓✓</span>
                <div class="video-grid">
                    <div class="v-box" style="background-image: url('https://via.placeholder.com/100')"><span>▶</span></div>
                    <div class="v-box" style="background-image: url('https://via.placeholder.com/100')"><span>▶</span></div>
                    <div class="v-box" style="background-image: url('https://via.placeholder.com/100')"><span>▶</span></div>
                    <div class="v-box more" style="background-image: url('https://via.placeholder.com/100')">
                        +13 <span>▶</span>
                    </div>
                </div>
                <div class="msg-footer">11:53 am <span class="blue-tick">✓✓</span></div>
                <div class="reaction-heart">❤️</div>
            </div>
        </div>
    </div>

    <div class="wa-footer">
        <div class="input-bar">
            <img src="https://via.placeholder.com/24/666?text=😊" class="chat-icon emoji-icon">
            
            <input type="text" placeholder="Message">
            
            <img src="https://via.placeholder.com/24/666?text=📎" class="chat-icon attach-icon">
            
            <img src="https://via.placeholder.com/24/666?text=📷" class="chat-icon camera-icon">
        </div>
        
        <div class="mic-button-circle">
            <img src="https://via.placeholder.com/24/fff?text=🎤" class="mic-icon">
        </div>
    </div>
</body>
</html>
