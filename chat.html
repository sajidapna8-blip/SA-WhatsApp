<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Family Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg">
    <div class="header">
        <div class="user-info">
            <a href="index.html" class="back-btn">←</a>
            <div class="profile-pic">👥</div>
            <div class="group-name">
                <strong>Sweet family ❤️</strong>
                <p>Abid bahi, Abu jaan, Cha...</p>
            </div>
        </div>
        <div class="header-icons">📹 &nbsp; 📞 &nbsp; ⋮</div>
    </div>

    <div class="chat-box">
        <div class="msg received">
            <span class="sender">Cha Cha Gulshar</span>
            <div class="voice-row">▶️ <div class="wave"></div> <span>0:44</span></div>
        </div>
        <div class="msg received">
            <span class="sender">Abu jaan</span>
            <p>inshallah</p>
            <span class="time">10:57 am</span>
        </div>
    </div>

    <div class="footer">
        <div class="input-bar">
            <span>😊</span>
            <input type="text" placeholder="Message">
            <span>📎</span>
            <span>📷</span>
        </div>
        <div class="mic-btn">🎤</div>
    </div>
</body>
</html>
