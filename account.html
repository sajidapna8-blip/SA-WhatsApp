<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        
        /* Header */
        .header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { color: #25d366; font-size: 26px; font-weight: bold; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; color: #54656f; }

        /* Search Bar */
        .search-area { padding: 10px 15px; background: #fff; }
        .search-box { background: #f0f2f5; padding: 10px 15px; border-radius: 25px; display: flex; align-items: center; gap: 12px; }
        .search-box i { color: #54656f; font-size: 16px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; color: #111b21; }

        /* Chat List */
        .chats-container { margin-top: 5px; padding-bottom: 80px; }
        .chat-row { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .chat-row:active { background: #f0f2f5; }
        
        .user-img { width: 55px; height: 55px; border-radius: 50%; background: #dfe5e7; margin-right: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-img i { font-size: 30px; color: white; }
        .user-img img { width: 100%; height: 100%; object-fit: cover; }

        .chat-details { flex: 1; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
