<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp 2026 Ultra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Section - ڈیزائن */
        :root { 
            --primary: #00ffa3; 
            --bg: #0b0e11; 
            --text: #ffffff; 
            --card: #1c2127; 
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Header */
        .header { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(11, 14, 17, 0.9); 
            backdrop-filter: blur(15px); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 163, 0.1);
        }
        .header h1 { font-size: 22px; font-weight: 800; color: var(--primary); text-shadow: 0 0 10px rgba(0, 255, 163, 0.3); }
        .header-icons { display: flex; gap: 18px; color: var(--primary); font-size: 19px; }

        /* AI Search Bar */
        .search-area { padding: 15px 20px; }
        .search-bar { 
            background: var(--card); 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            padding: 12px 18px; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: 0.4s;
        }
        .search-bar:focus-within { 
            border-color: var(--primary); 
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.2); 
        }
        .search-bar input { background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 15px; }

        /* Sajid AI Feature */
        .ai-banner { 
            margin: 10px 20px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            padding: 1px; 
            border-radius: 15px; 
            cursor: pointer;
            animation: glow 3s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 5px var(--primary); } to { box-shadow: 0 0 15px var(--accent); } }
        
        .ai-inner { background: var(--bg); padding: 12px; border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; }
        .ai-inner i { color: var(--primary); font-size: 20px; }

        /* Chat List */
        .chat-list { padding: 10px 20px; margin-bottom: 90px; }
        .chat-card { 
            background: var(--card); 
            margin-bottom: 15px; 
            padding: 18px; 
            border-radius: 22px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .chat-card:active { transform: scale(0.97); background: #252d35; }
        
        .user-pic { 
            width: 55px; 
            height: 55px; 
            border-radius: 18px; 
            background: linear-gradient(45deg, #2c3e50, #4ca1af); 
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-pic i { font-size: 24px; color: rgba(255,255,255,0.8); }
        .online-dot { 
            position: absolute; 
            top: -3px; 
            right: -3px; 
            width: 14px; 
            height: 14px; 
            background: var(--primary); 
            border: 3px solid var(--card); 
            border-radius: 50%; 
        }
        
        .chat-content { flex: 1; }
        .chat-content h3 { font-size: 17px; margin-bottom: 4px; font-weight: 600; }
        .chat-content p { font-size: 13px; color: #9aaaba; }
        
        .chat-meta { text-align: right; }
        .time { font-size: 11px; color: var(--primary); display: block; margin-bottom: 4px; }
        .status-icons { font-size: 14px; color: var(--primary); }

        /* Futuristic Bottom Nav */
        .nav-bar { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            right: 20px; 
            background: rgba(28, 33, 39, 0.85); 
            backdrop-filter: blur(20px); 
            border-radius: 25px; 
            padding: 12px; 
            display: flex; 
            justify-content: space-around; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: #667781; font-size: 22px; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 15px; }
        .nav-item.active { color: var(--primary); background: rgba(0, 255, 163, 0.1); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="header">
        <h1>WA 2026 ULTRA</h1>
        <div class="header-icons">
            <i class="fas fa-bolt" title="Turbo Mode"></i>
            <i class="fas fa-shield-alt" title="Privacy"></i>
            <i class="fas fa-ellipsis-h"></i>
        </div>
    </div>

    <div class="search-area">
        <div class="search-bar">
            <i class="fas fa-atom"></i>
            <input type="text" placeholder="AI Intelligence Search...">
        </div>
    </div>

    <div class="ai-banner" id="aiBtn">
        <div class="ai-inner">
            <i class="fas fa-robot"></i>
            <span>SAJID AI ASSISTANT (2026)</span>
        </div>
    </div>

    <div class="chat-list" id="chatList">
        <div class="chat-card">
            <div class="user-pic">
                <i class="fas fa-user"></i>
                <div class="online-dot"></div>
            </div>
            <div class="chat-content">
                <h3>Sajid Hussain (Admin)</h3>
                <p>New Update: Real-time AI is active!</p>
            </div>
            <div class="chat-meta">
                <span class="time">10:20 PM</span>
                <div class="status-icons"><i class="fas fa-check-double"></i></div>
            </div>
        </div>

        <div class="chat-card">
            <div class="user-pic">
                <i class="fas fa-users"></i>
            </div>
            <div class="chat-content">
                <h3>Programming Team</h3>
                <p>Android Coding is the future...</p>
            </div>
            <div class="chat-meta">
                <span class="time">09:45 PM</span>
                <div class="status-icons"><i class="fas fa-check"></i></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fas fa-comment-dots nav-item active"></i>
        <i class="fas fa-circle-notch nav-item"></i>
        <i class="fas fa-rocket nav-item" style="color: var(--primary);"></i>
        <i class="fas fa-ghost nav-item"></i>
        <i class="fas fa-cog nav-item"></i>
    </div>

    <script>
        // 1. Sajid AI Assistant Functionality
        document.getElementById('aiBtn').addEventListener('click', () => {
            const userMsg = prompt("آپ کا کیا سوال ہے ساجد بھائی؟");
            if (userMsg) {
                alert("Sajid AI 2026: آپ نے پوچھا '" + userMsg + "'۔ اس پر کام جاری ہے، ہم اسے جلد مکمل کریں گے!");
            }
        });

        // 2. Chat Selection Effect
        document.querySelectorAll('.chat-card').forEach(card => {
            card.addEventListener('click', () => {
                const name = card.querySelector('h3').innerText;
                alert(name + " کے ساتھ محفوظ چیٹ شروع ہو رہی ہے...");
            });
        });

        // 3. Navigation Switching
        const navs = document.querySelectorAll('.nav-item');
        navs.forEach(nav => {
            nav.addEventListener('click', function() {
                document.querySelector('.nav-item.active').classList.remove('active');
                this.classList.add('active');
            });
        });

        console.log("WhatsApp 2026 Ultra Engine: Ready to Launch.");
    </script>
</body>
</html>
