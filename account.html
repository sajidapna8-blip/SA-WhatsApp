<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp 2026 Ultra - BY SAJID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 2026 Futuristic Styling */
        :root { 
            --primary: #00ffa3; 
            --bg: #0b0e11; 
            --card: #1c2127; 
            --accent: #00d4ff;
            --msg-sent: #005c4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { padding: 18px; display: flex; justify-content: space-between; align-items: center; background: rgba(11, 14, 17, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 255, 163, 0.1); }
        .header h1 { font-size: 20px; color: var(--primary); font-weight: 800; letter-spacing: 1px; }

        /* Main Content Area */
        #main-view { flex: 1; overflow-y: auto; padding-bottom: 80px; }

        /* AI Search Bar */
        .search-area { padding: 15px; }
        .search-bar { background: var(--card); border: 1px solid rgba(0, 255, 163, 0.2); padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; }
        .search-bar input { background: transparent; border: none; outline: none; color: #fff; width: 100%; }

        /* Chat Cards */
        .chat-list { padding: 0 15px; }
        .chat-card { 
            background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 18px; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s;
        }
        .chat-card:active { transform: scale(0.96); }
        .user-pic { width: 50px; height: 50px; border-radius: 15px; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #000; font-size: 20px; }

        /* Chat Screen (Initially Hidden) */
        #chat-view { display: none; flex-direction: column; height: 100vh; background: #000; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; }
        .chat-header { padding: 15px; background: var(--card); display: flex; align-items: center; gap: 15px; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-alpha: 0.1; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--msg-sent); }
        .received { align-self: flex-start; background: var(--card); }

        /* Input Bar */
        .input-bar { padding: 15px; background: var(--bg); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: var(--card); border: 1px solid var(--primary); padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(28, 33, 39, 0.9); padding: 12px; border-radius: 20px; display: flex; justify-content: space-around; }
        .nav i { color: #667781; font-size: 20px; }
        .nav i.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <h1>WA 2026 ULTRA</h1>
            <i class="fas fa-robot" onclick="alert('Sajid AI is watching...')"></i>
        </div>

        <div class="search-area">
            <div class="search-bar">
                <i class="fas fa-atom" style="color: var(--primary);"></i>
                <input type="text" placeholder="AI Intelligence Search...">
            </div>
        </div>

        <div class="chat-list">
            <div class="chat-card" onclick="openChat('Shakeel Czn')">
                <div class="user-pic"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <h4>Shakeel Czn</h4>
                    <p style="font-size: 12px; color: #888;">2026 update is here!</p>
                </div>
            </div>
            <div class="chat-card" onclick="openChat('Abid Bahi')">
                <div class="user-pic"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <h4>Abid Bahi</h4>
                    <p style="font-size: 12px; color: #888;">Online</p>
                </div>
            </div>
        </div>

        <div class="nav">
            <i class="fas fa-comment-dots active"></i>
            <i class="fas fa-circle-notch"></i>
            <i class="fas fa-users"></i>
            <i class="fas fa-cog"></i>
        </div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <h3 id="chat-name">User Name</h3>
        </div>
        <div class="messages" id="message-box">
            <div class="msg received">Welcome to 2026 WhatsApp!</div>
        </div>
        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // Chat Open/Close Logic
        function openChat(name) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-view').style.display = 'flex';
        }

        function closeChat() {
            document.getElementById('chat-view').style.display = 'none';
        }

        // Messaging Logic
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const box = document.getElementById('message-box');
            if(input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'msg sent';
                div.innerText = input.value;
                box.appendChild(div);
                input.value = "";
                box.scrollTop = box.scrollHeight;
                
                // 2026 AI Auto Reply
                setTimeout(() => {
                    const reply = document.createElement('div');
                    reply.className = 'msg received';
                    reply.innerText = "Sajid AI: میسج موصول ہو گیا!";
                    box.appendChild(reply);
                    box.scrollTop = box.scrollHeight;
                }, 1000);
            }
        }
    </script>

</body>
</html>
