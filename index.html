<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sajid Ultra Pro WA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00a884; --bg: #ffffff; --chat-bg: #efeae2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; position: fixed; background: white; }

        /* Home Header */
        .header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; }

        /* Main View Container */
        #main-view { height: 100%; display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .section-label { padding: 10px 15px; background: #f0f2f5; font-size: 13px; color: var(--primary); font-weight: bold; }
        .chat-card { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }

        /* AI Floating Button with Custom Icon */
        .ai-fab { position: fixed; bottom: 100px; right: 20px; width: 65px; height: 65px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 999; border: 2px solid var(--primary); }
        .ai-fab img { width: 90%; height: 90%; border-radius: 50%; }

        /* Bottom Navigation */
        .nav { background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; }
        .nav-item { text-align: center; color: #667781; flex: 1; font-size: 12px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); }

        /* Chat Window View */
        #chat-view { display: none; flex-direction: column; height: 100%; width: 100%; position: fixed; inset: 0; background: var(--chat-bg); z-index: 2000; }
        .chat-header { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; }
        .header-icons { display: flex; gap: 18px; color: var(--primary); font-size: 18px; padding-right: 5px; }
        
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }

        /* Chat Input Bar */
        .input-bar { padding: 8px; background: #f0f2f5; display: flex; align-items: center; gap: 6px; }
        .input-container { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 5px 12px; }
        .input-container input { flex: 1; border: none; outline: none; font-size: 16px; padding: 8px 0; background: transparent; }
        .icon-btn { color: #667781; font-size: 20px; padding: 4px; cursor: pointer; }
        .send-btn-circle { width: 45px; height: 45px; background: var(--primary); color: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <h1>WhatsApp Pro</h1>
            <div style="display:flex; gap:18px;"><i class="fas fa-camera"></i><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
        </div>

        <div class="chat-list">
            <div class="section-label">GROUPS</div>
            <div class="chat-card" onclick="openChat('Sajid Tech Group', 'fas fa-users')">
                <div class="user-pic" style="background:var(--primary); color:white;"><i class="fas fa-users"></i></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between;"><h4>Sajid Tech Group</h4><span style="font-size:11px; color:#667781">12:30 PM</span></div>
                    <p style="color:#667781; font-size:13px;">Shakeel: Typing is easy now!</p>
                </div>
            </div>

            <div class="section-label">DIRECT CHATS</div>
            <div class="chat-card" onclick="openChat('Shakeel Czn', 'fas fa-user')">
                <div class="user-pic"><i class="fas fa-user" style="color:#aaa"></i></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between;"><h4>Shakeel Czn</h4><span style="font-size:11px; color:#667781">Yesterday</span></div>
                    <p style="color:#667781; font-size:13px;">Sajid Bhai, this looks so professional.</p>
                </div>
            </div>
        </div>

        <div class="ai-fab" onclick="openChat('AI Assistant', 'img')">
            <img src="https://i.imgur.com/8N7fX8M.png" alt="Modern AI">
        </div>

        <div class="nav">
            <div class="nav-item active"><i class="fas fa-users"></i><span>Groups</span></div>
            <div class="nav-item"><i class="fas fa-circle-notch"></i><span>States</span></div>
            <div class="nav-item"><i class="fas fa-phone-alt"></i><span>Calls</span></div>
        </div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--primary); padding:10px; cursor:pointer;"></i>
            <div class="user-pic" style="width:38px; height:38px;" id="header-pic"></div>
            <div style="flex:1"><h4 id="chat-name">Name</h4><p style="font-size:11px; color:var(--primary)">Online</p></div>
            <div class="header-icons">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone-alt"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div class="messages" id="box"></div>
        
        <div class="input-bar">
            <div class="input-container">
                <i class="far fa-smile icon-btn"></i>
                <input type="text" id="in" placeholder="Message" oninput="toggleIcon()" autocomplete="off">
                <i class="fas fa-paperclip icon-btn"></i>
                <i class="fas fa-camera icon-btn"></i>
            </div>
            <button class="send-btn-circle" onclick="send()">
                <i class="fas fa-microphone" id="icon-type"></i>
            </button>
        </div>
    </div>

    <script>
        function openChat(name, type) {
            document.getElementById('chat-name').innerText = name;
            const hPic = document.getElementById('header-pic');
            if(type === 'img') { hPic.innerHTML = `<img src="https://i.imgur.com/8N7fX8M.png">`; }
            else { hPic.innerHTML = `<i class="${type}" style="color:white"></i>`; hPic.style.background = "#00a884"; }
            document.getElementById('chat-view').style.display = 'flex';
        }
        function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
        
        function toggleIcon() {
            const val = document.getElementById('in').value;
            const icon = document.getElementById('icon-type');
            icon.className = val.trim() !== "" ? "fas fa-paper-plane" : "fas fa-microphone";
        }

        function send() {
            const i = document.getElementById('in');
            const b = document.getElementById('box');
            if(i.value.trim() !== "") {
                const d = document.createElement('div');
                d.className = 'msg sent'; d.innerText = i.value;
                b.appendChild(d); i.value = ""; toggleIcon();
                b.scrollTop = b.scrollHeight;
            }
        }
    </script>
</body>
              </html>
