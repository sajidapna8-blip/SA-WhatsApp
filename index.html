<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-screen">
        <div class="header">
            <div class="top-row">
                <span class="app-name">WhatsApp</span>
                <div class="header-icons">
                    <span>📷</span> <span>🔍</span> <span>⋮</span>  </div>
            </div>
            <div class="tabs">
                <div class="tab-icon">👥</div> <div class="tab">CHATS</div>
                <div class="tab active">STATUS</div>
                <div class="tab">CALLS</div>
            </div>
        </div>

        <div class="chat-list">
            <a href="chat.html" style="text-decoration: none; color: black;">
                <div class="chat-item">
                    <div class="avatar-bg">👥</div>
                    <div class="chat-details">
                        <div class="chat-title">
                            <strong>کوڈنگ گروپ (ساجد بھائی)</strong>
                            <span class="time">1:15 PM</span>
                        </div>
                        <p class="last-msg">ساجد بھائی: ویڈیو کال اور وائس چیک کریں...</p>
                    </div>
                </div>
            </a>
            
            <div class="chat-item">
                <div class="avatar-bg">👤</div>
                <div class="chat-details">
                    <div class="chat-title">
                        <strong>میرا نمبر</strong>
                        <span class="time">Yesterday</span>
                    </div>
                    <p class="last-msg">تصویر بھیجیں</p>
                </div>
            </div>
        </div>

        <div class="fab-button">➕</div>
    </div>
</body>
  </html>
