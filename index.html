<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="wa-header-top">
            <span class="wa-logo">WhatsApp</span>
            <div class="top-icons">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>⋮</span>
            </div>
        </div>

        <div class="wa-tabs">
            <div class="tab">CHATS</div>
            <div class="tab active">STATUS</div>
            <div class="tab">CALLS</div>
        </div>

        <div class="chats-list">
            <a href="chat.html" class="chat-row">
                <div class="avatar-box">
                    <img src="https://via.placeholder.com/50/075e54/ffffff?text=F" alt="Family">
                </div>
                <div class="chat-details">
                    <div class="chat-title">
                        <strong>Sweet family <svg viewBox="0 0 24 24" width="16" height="16" fill="#e91e63" style="display:inline; vertical-align:middle;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></strong>
                        <span class="chat-time">1:15 pm</span>
                    </div>
                    <div class="chat-msg">
                        <div class="msg-content">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="#888" style="vertical-align:middle; margin-right:4px;"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                            <span>Voice message...</span>
                        </div>
                        <span class="unread-count">1</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
                                                                                                                                           </html>
