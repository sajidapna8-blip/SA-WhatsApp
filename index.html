<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAJID ULTRA WA 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00a884; --bg: #ffffff; --chat-bg: #efeae2; --msg-sent: #d9fdd3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        
        /* Main View */
        #main-view { flex: 1; overflow-y: auto; background: white; padding-bottom: 90px; }
        .section-label { padding: 12px 15px; background: #f0f2f5; font-size: 13px; color: #00a884; font-weight: bold; }
        .chat-card { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; }
        .user-pic { width: 55px; height: 55px; border-radius: 50%; background: #dfe5e7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }

        /* Chat View (FIXED) */
        #chat-view { display: none; flex-direction: column; height: 100vh; width: 100vw; position: fixed; inset: 0; background: var(--chat-bg); z-index: 2000; }
        .chat-header { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--msg-sent); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: white; border-top-left-radius: 0; }

        /* Input Bar (Exactly like WhatsApp) */
        .input-bar { padding: 8px; background: transparent; display: flex; gap: 5px; align-items: flex-end; flex-shrink: 0; margin-bottom: 5px; }
        .input-container { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 5px 12px; min-height: 45px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .input-container input { flex: 1; border: none; outline: none; font-size: 16px; padding: 8px 0; background: transparent; }
        .send-btn-circle { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: none; flex-shrink: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* Bottom Nav Circles */
        .nav { background: white; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #eee; height: 80px; position: fixed; bottom: 0; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #667781; flex: 1; }
        .nav-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; font-size: 18px; }
        .active .nav-circle { background: #d9fdd3; color: #00604b; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <h1>WhatsApp Pro</h1>
            <div style="display:flex; gap:20px;"><i class="fas fa-camera"></i><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
        </div>
        <div class="section-label">AI CHAT</div>
        <div class="chat-card" onclick="openChat('AI Assistant (IB)', 'https://i.imgur.com/8N7fX8M.png')">
            <div class="user-pic"><img src="https://i.imgur.com/8N7fX8M.png"></div>
            <div style="flex:1"><h4>AI Assistant (IB)</h4><p style="color:#667781">Sajid Bhai, type box is fixed! ✅</p></div>
        </div>
        <div class="section-label">GROUPS</div>
        <div class="chat-card" onclick="openChat('Sajid Tech Group', '')">
            <div class="user-pic" style="background:var(--primary); color:white;"><i class="fas fa-users"></i></div>
            <div style="flex:1"><h4>Sajid Tech Group</h4><p style="color:#667781">Shakeel: Try typing now!</p></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active"><div class="nav-circle"><i class="fas fa-users"></i></div><span>Groups</span></div>
        <div class="nav-item"><div class="nav-circle"><i class="fas fa-circle-notch"></i></div><span>States</span></div>
        <div class="nav-item"><div class="nav-circle"><i class="fas fa-phone-alt"></i></div><span>Calls</span></div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
            <div class="user-pic" id="chat-pic" style="width:40px; height:40px;"></div>
            <div style="flex:1"><h3 id="chat-name">User</h3><p style="font-size:11px; color:var(--primary)">Online</p></div>
            <i class="fas fa-video" style="color:var(--primary); margin-right:15px;"></i>
            <i class="fas fa-phone" style="color:var(--primary);"></i>
        </div>
        <div class="messages" id="box"></div>
        
        <div class="input-bar">
            <div class="input-container">
                <i class="far fa-smile" style="color:#667781; margin-right:10px; font-size:20px;"></i>
                <input type="text" id="in" placeholder="Message">
                <i class="fas fa-paperclip" style="color:#667781; margin-left:10px; font-size:20px;"></i>
            </div>
            <button class="send-btn-circle" onclick="send()">
                <i class="fas fa-paper-plane" id="send-icon"></i>
            </button>
        </div>
    </div>

    <script>
        function openChat(name, pic) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-pic').innerHTML = pic ? `<img src="${pic}">` : `<i class="fas fa-users" style="color:white"></i>`;
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('main-view').style.display = 'none';
        }
        function closeChat() {
            document.getElementById('chat-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }
        function send() {
            const i = document.getElementById('in');
            const b = document.getElementById('box');
            if(i.value.trim() !== "") {
                const d = document.createElement('div');
                d.className = 'msg sent';
                d.innerText = i.value;
                b.appendChild(d);
                i.value = "";
                b.scrollTop = b.scrollHeight;
            }
        }
    </script>
</body>
                                                                                        </html>
