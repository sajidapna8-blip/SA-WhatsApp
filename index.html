<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="wa-header-top">
            <span class="wa-logo">WhatsApp</span>
            <div class="top-icons">
                <span>📷</span>
                <span>🔍</span>
                <span>⋮</span>
            </div>
        </div>

        <div class="wa-tabs">
            <div class="tab">CHATS</div>
            <div class="tab active">STATUS</div>
            <div class="tab">CALLS</div>
        </div>

        <div class="chats-list">
            <a href="chat.html" class="chat-row">
                <div class="avatar-box">
                    <img src="https://via.placeholder.com/50" alt="Family">
                </div>
                <div class="chat-details">
                    <div class="chat-title">
                        <strong>Sweet family ❤️</strong>
                        <span class="chat-time">1:15 pm</span>
                    </div>
                    <div class="chat-msg">
                        <span>Cha Cha Gulshar: 🎤 Voice message...</span>
                        <span class="unread-count">1</span>
                    </div>
                </div>
            </a>

            <div class="chat-row">
                <div class="avatar-box">
                    <img src="https://via.placeholder.com/50" alt="Shakeel">
                </div>
                <div class="chat-details">
                    <div class="chat-title">
                        <strong>Shakeel czn</strong>
                        <span class="chat-time">27/02/2026</span>
                    </div>
                    <div class="chat-msg">
                        <span>Hi</span>
                        <span class="unread-count">1</span>
                    </div>
                </div>
            </div>

            <div class="chat-row">
                <div class="avatar-box">
                    <img src="https://via.placeholder.com/50" alt="Atif">
                </div>
                <div class="chat-details">
                    <div class="chat-title">
                        <strong>Atif Jan</strong>
                        <span class="chat-time">25/02/2026</span>
                    </div>
                    <div class="chat-msg">
                        <span>📷 2 photos</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="floating-action-btn">+</div>
    </div>
</body>
</html>
