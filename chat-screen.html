<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Ultra Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ffa3; --bg: #0b0e11; --card: #1c2127; --user-msg: #005c4b; --friend-msg: #202c33; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* Modern Chat Header */
        .chat-header { padding: 15px; background: rgba(28, 33, 39, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0,255,163,0.1); }
        .back-btn { color: var(--primary); font-size: 20px; text-decoration: none; }
        .user-info h3 { font-size: 16px; margin: 0; }
        .user-info span { font-size: 11px; color: var(--primary); }

        /* Message Area */
        .message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg); }
        
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; position: relative; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--friend-msg); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #aaa; display: block; text-align: right; margin-top: 5px; }

        /* Futuristic Input Bar */
        .input-bar { padding: 15px; background: var(--bg); display: flex; align-items: center; gap: 10px; }
        .input-box { background: var(--card); flex: 1; border-radius: 25px; padding: 10px 18px; display: flex; align-items: center; border: 1px solid rgba(0,255,163,0.2); }
        .input-box input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 15px; }
        
        .send-btn { background: var(--primary); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0b0e11; border: none; box-shadow: 0 0 15px rgba(0,255,163,0.4); }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="account.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info">
            <h3>Shakeel Czn</h3>
            <span>Online | Secured by 2026 Engine</span>
        </div>
    </div>

    <div class="message-area" id="chatBox">
        <div class="msg received">سلام ساجد بھائی! کیا یہ 2026 کا واٹس ایپ ہے؟ <span class="msg-time">10:30 PM</span></div>
        <div class="msg sent">جی ہاں! یہ اینڈرائڈ کے لیے فل فیوچرسٹک بنایا ہے <span class="msg-time">10:31 PM</span></div>
    </div>

    <div class="input-bar">
        <div class="input-box">
            <i class="far fa-smile" style="margin-right: 10px; color: #8696a0;"></i>
            <input type="text" id="msgInput" placeholder="2026 Encryption Message...">
            <i class="fas fa-paperclip" style="margin-left: 10px; color: #8696a0;"></i>
        </div>
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const chatBox = document.getElementById('chatBox');
            
            if (input.value.trim() !== "") {
                // نیا میسج بنانا
                const newMsg = document.createElement('div');
                newMsg.className = 'msg sent';
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                newMsg.innerHTML = input.value + '<span class="msg-time">' + time + '</span>';
                
                // اسکرین پر دکھانا
                chatBox.appendChild(newMsg);
                
                // اسکرول نیچے کرنا
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // خانہ خالی کرنا
                input.value = "";
            }
        }
    </script>
</body>
</html>
